<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Plataformas Multinivel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="scoreboard">Vidas: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        
        <!-- Botones táctiles para celulares -->
        <div id="mobile-controls">
            <div class="dpadr">
                <button id="btn-left" class="btn-game">⬅️</button>
                <button id="btn-right" class="btn-game">➡️</button>
            </div>
            <div class="action-buttons">
                <button id="btn-attack" class="btn-game action-btn">⚔️</button>
                <button id="btn-jump" class="btn-game action-btn">🦘</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
