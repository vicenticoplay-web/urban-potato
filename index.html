<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Plataformas Multinivel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>Aventura de Plataformas</h1>
        <div class="hud">Vidas: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <p class="controls">
            <strong>Controles:</strong> Flechas Izquierda/Derecha para moverte. <br>
            Flecha Arriba o Espacio para saltar. Tecla <strong>F</strong> o <strong>X</strong> para atacar (cuando tengas la espada).
        </p>
    </div>

    <script src="game.js"></script>
</body>
</html>
